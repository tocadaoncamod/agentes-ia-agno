<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgenteMaestro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 360px;
    min-height: 480px;
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 16px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 { font-size: 16px; font-weight: 700; color: #7c3aed; }
  .header .status { font-size: 11px; color: #888; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .chat-area {
    height: 280px;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #111;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 90%;
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
  }
  .msg.user { background: #7c3aed; color: #fff; align-self: flex-end; }
  .msg.agent { background: #1e1e2e; color: #e0e0e0; border: 1px solid #333; align-self: flex-start; }
  .msg.system { background: #1a2a1a; color: #86efac; border: 1px solid #166534; align-self: center; font-size: 11px; }

  .actions {
    padding: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid #222;
  }
  .btn-action {
    background: #1e1e2e;
    border: 1px solid #333;
    color: #a78bfa;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    transition: all .2s;
  }
  .btn-action:hover { background: #2d2d4e; border-color: #7c3aed; }

  .input-area {
    padding: 10px;
    display: flex;
    gap: 8px;
    background: #0f0f0f;
    border-top: 1px solid #222;
  }
  #msg-input {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 12px;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
    resize: none;
    height: 60px;
    font-family: inherit;
  }
  #msg-input:focus { border-color: #7c3aed; }
  #send-btn {
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 18px;
    transition: background .2s;
    align-self: flex-end;
    height: 40px;
  }
  #send-btn:hover { background: #6d28d9; }
  #send-btn:disabled { background: #333; cursor: not-allowed; }

  .footer {
    padding: 8px;
    text-align: center;
    font-size: 10px;
    color: #444;
  }
  .footer a { color: #7c3aed; text-decoration: none; }

  #loading { display: none; text-align: center; padding: 8px; color: #7c3aed; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <div class="status-dot" id="status-dot"></div>
  <div>
    <h1>🤖 AgenteMaestro</h1>
    <div class="status" id="status-text">Conectando...</div>
  </div>
</div>

<div class="actions">
  <button class="btn-action" onclick="sendPageContent()">📄 Mandar página</button>
  <button class="btn-action" onclick="sendSelection()">✂️ Seleção</button>
  <button class="btn-action" onclick="captureProducts()">🛍️ Produtos</button>
  <button class="btn-action" onclick="openPanel()">🌐 Painel</button>
</div>

<div class="chat-area" id="chat"></div>
<div id="loading">⏳ AgenteMaestro pensando...</div>

<div class="input-area">
  <textarea id="msg-input" placeholder="Pergunte algo ao AgenteMaestro..." rows="2"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<div class="footer">
  <a href="http://localhost:8000" target="_blank">Abrir painel completo ↗</a>
</div>

<script src="popup.js"></script>
</body>
</html>
